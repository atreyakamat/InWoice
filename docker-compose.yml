services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/uploads:/app/backend/uploads
      - ./backend/backups:/app/backend/backups
    environment:
      DATABASE_PATH: /app/backend/data/data.db
      WA_SESSION_DATA_PATH: /app/backend/data/openwa-sessions
    restart: unless-stopped

  local-ai:
    build: ./local_ai
    ports:
      - "8000:8000"
    restart: unless-stopped
    profiles:
      - ai
    # Note: Running AI models requires significant RAM. 
    # If deploying on a low-power device, use Gemini Cloud instead.
